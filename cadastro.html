<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro no Salão e Barbearia</title>
    <link rel="stylesheet" href="cadastro.css">
  </head>
  <body>
    <div class="cadastro-wrapper">
      <div class="cadastro-container">
        <h1>Cadastro no Salão e Barbearia</h1>

        <form>
          <label for="nome">
            👤 Nome:
          </label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>

          <label for="email">
            📧 Email:
          </label>
          <input type="email" id="email" name="email" placeholder="Digite seu email" required>

          <label for="telefone">
            📞 Telefone:
          </label>
          <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone (opcional)">

          <label for="senha">
            🔒 Senha:
          </label>
          <input type="password" id="senha" name="senha" placeholder="Crie uma senha segura" required>

          <label for="confirmar-senha">
            🔑 Confirmar Senha:
          </label>
          <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha" required>

          <button type="submit">Cadastrar Agora ✨</button>
        </form>

        <hr>

        <div class="info">
          <div class="info-item">
            Já tem uma conta? <a href="login.html">Faça login aqui</a>.
          </div>
        </div>

        <p class="terms">
          Ao se cadastrar, você concorda com nossos termos de uso e política de privacidade.
        </p>
      </div>
    </div>
  </body>
</html>
