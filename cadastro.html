<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - StyleBarber</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="cadastro-container">
        <div class="cadastro-card">
            <div class="logo-section">
                <h1>StyleBarber</h1>
                <p>Crie sua conta gratuita</p>
            </div>
            
            <form class="cadastro-form">
                <div class="input-row">
                    <div class="input-group">
                        <label>Nome</label>
                        <input type="text" placeholder="Nome completo" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="tel" placeholder="(11) 99999-9999" required>
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Tipo de Conta</label>
                    <select required>
                        <option>Selecione</option>
                        <option>Cliente</option>
                        <option>Profissional</option>
                        <option>Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn-cadastro">Criar Conta</button>
            </form>
            
            <div class="cadastro-links">
                <a href="login.html">Já tenho conta</a>
            </div>
        </div>
    </div>
</body>
</html>
