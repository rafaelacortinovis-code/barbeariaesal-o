<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Estilo Perfeito</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cadastro-page">
    <div class="page-wrapper">
        <div class="page-container">
            <div class="page-icon">👤</div>
            
            <h1>Criar Conta</h1>
            <p class="intro-text">Escolha seu tipo de conta e comece agora</p>

            <!-- CARDS DE CADASTRO DIRETO -->
            <div class="demo-cadastro">
                <a href="cliente.html" class="cadastro-card cliente-card">
                    <div class="cadastro-icon">👤</div>
                    <h3>Cliente</h3>
                    <p>Agende seus cortes e serviços</p>
                    <div class="cadastro-cta">COMEÇAR COMO CLIENTE</div>
                </a>
                
                <a href="profissional.html" class="cadastro-card profissional-card">
                    <div class="cadastro-icon">✂️</div>
                    <h3>Profissional</h3>
                    <p>Gerencie sua agenda de trabalho</p>
                    <div class="cadastro-cta">COMEÇAR COMO PROFISSIONAL</div>
                </a>
            </div>

            <div class="auth-links">
                <a href="login.html" class="auth-link">Já tem conta? Faça login</a>
            </div>

            <p class="terms">Acesso imediato - sem necessidade de formulários ✨</p>
        </div>
    </div>
</body>
</html>
