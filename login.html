<!-- login.html - Página de Login (harmonizada com cadastro e inicial) -->
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login no Salão e Barbearia</title>
    <link rel="stylesheet" href="login.css">
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-container">
        <h1>Bem-vindo ao Login</h1>

        <form>
          <label for="usuario">
            👤 Usuário:
          </label>
          <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>

          <label for="senha">
            🔒 Senha:
          </label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

          <button type="submit">Entrar Agora ✨</button>
        </form>

        <hr>

        <div class="info">
          <div class="info-item">
            <b>Usuário de teste:</b> admin
          </div>
          <div class="info-item">
            <b>Senha de teste:</b> 123456
          </div>
          <div class="info-item">
            Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>.
          </div>
        </div>

        <p class="terms">
          Ao fazer login, você concorda com nossos termos de uso.
        </p>

        <a href="index.html" class="back-link">Voltar à Página Inicial</a>
      </div>
    </div>
  </body>
</html>
